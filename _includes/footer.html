<footer class="site-footer">
  <div class="wrap">
    <p>&copy; {{ 'now' | date: "%Y" }} {{ site.social.name }}</p>
    <p class="site-footer__links">
      {% for link in site.social.links %}<a href="{{ link }}">{{ link | split: '//' | last | split: '/' | first }}</a>{% endfor %}
    </p>
  </div>
</footer>
