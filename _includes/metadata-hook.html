<meta name="naver-site-verification" content="3acf5e196b4f28c3006c9421b91b997f79ef39aa" />
<style>
  /* 포스트 내부 상단 hero 이미지 숨김 */
  /* 홈 목록의 썸네일은 div.preview-img, 포스트 내부 hero는 a.preview-img — 태그가 달라 구분 가능 */
  a.preview-img,
  a.preview-img + figcaption {
    display: none !important;
  }
  /* hero 이미지를 감싸는 빈 wrapper div 여백 제거 */
  .mt-3.mb-3:has(a.preview-img) {
    display: none !important;
  }
</style>
<script>
  /* Service Worker 업데이트 자동 적용 — 알림 팝업 없이 즉시 교체 */
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.ready.then(function(registration) {
      registration.addEventListener('updatefound', function() {
        var newWorker = registration.installing;
        newWorker.addEventListener('statechange', function() {
          // 새 SW가 설치 완료되어 대기 중이면 즉시 활성화
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            newWorker.postMessage({ type: 'SKIP_WAITING' });
          }
        });
      });
    });

    // 새 SW가 활성화되면 페이지 자동 새로고침
    navigator.serviceWorker.addEventListener('controllerchange', function() {
      window.location.reload();
    });
  }
</script>
