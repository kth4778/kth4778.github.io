<header class="site-header">
  <div class="wrap site-header__inner">
    <a class="site-header__logo" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <nav class="site-header__nav">
      <a href="{{ '/' | relative_url }}">Tech Log</a>
      <a href="{{ '/about/' | relative_url }}">About</a>
      <button class="site-header__search" type="button" aria-label="검색" data-search-toggle>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/>
        </svg>
      </button>
      <button class="site-header__theme" type="button" aria-label="테마 전환" data-theme-toggle>
        <svg class="theme-icon theme-icon--moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/>
        </svg>
        <svg class="theme-icon theme-icon--sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
      </button>
    </nav>
  </div>
</header>
