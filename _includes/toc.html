<nav class="toc" data-toc aria-label="목차">
  <p class="toc__title">목차</p>
  <ul class="toc__list" data-toc-list></ul>
</nav>

<script>
  (function () {
    var body = document.querySelector('.post__body');
    var list = document.querySelector('[data-toc-list]');
    if (!body || !list) return;

    var heads = Array.prototype.slice.call(body.querySelectorAll('h1[id], h2[id], h3[id]'));
    if (heads.length === 0) { document.querySelector('[data-toc]').remove(); return; }

    // 글마다 최상위 헤딩 레벨이 달라도(h1 시작 vs h2 시작) 들여쓰기 깊이를 0부터 정규화
    var minLevel = heads.reduce(function (m, h) { return Math.min(m, +h.tagName[1]); }, 9);
    var items = heads.map(function (h) {
      var li = document.createElement('li');
      li.className = 'toc__item toc__item--d' + Math.min(+h.tagName[1] - minLevel, 2);
      var a = document.createElement('a');
      a.href = '#' + h.id;
      a.textContent = h.textContent;
      li.appendChild(a);
      list.appendChild(li);
      return li;
    });

    // 스크롤 스파이 — 뷰포트 상단(오프셋 96px)을 지난 마지막 헤딩이 현재 구간
    var active = null;
    function update() {
      var current = items[0];
      for (var i = 0; i < heads.length; i++) {
        if (heads[i].getBoundingClientRect().top <= 96) current = items[i];
        else break;
      }
      if (current !== active) {
        if (active) active.classList.remove('is-active');
        current.classList.add('is-active');
        active = current;
      }
    }
    window.addEventListener('scroll', update, { passive: true });
    window.addEventListener('resize', update, { passive: true });
    update();
  })();
</script>
